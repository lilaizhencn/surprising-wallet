server:
  port: 8081

spring:
  task:
    scheduling:
      pool:
        size: 4
      thread-name-prefix: sig2-scheduler-
  application:
    name: wallet-sig2
  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${SW_DB_URL:jdbc:postgresql://127.0.0.1:5432/wallet}
    username: ${SW_DB_USERNAME:wallet}
    password: ${SW_DB_PASSWORD:}
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      password:

logging:
  level:
    default: INFO

sw:
  wallet:
    network: test
