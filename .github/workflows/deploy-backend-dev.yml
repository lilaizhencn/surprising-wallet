name: Deploy backend dev
# Server-side: checkout → mvn compile → SSH trigger → server git pull → build → deploy

on:
  push:
    branches: [master]
    paths:
      - .github/workflows/deploy-backend-dev.yml
      - common/**
      - chain-sdks/**
      - wallet-sig1/**
      - wallet-sig2/**
      - wallet-service/**
      - wallet-api/**
      - pom.xml
      - scripts/deploy/backend-deploy.sh
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-backend-dev
  cancel-in-progress: false

jobs:
  verify-and-trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Compile (tests skipped)
        run: mvn -B -ntp compile

      - name: Configure SSH
        env:
          DEPLOY_KEY: ${{ secrets.BACKEND_DEPLOY_SSH_KEY }}
          DEPLOY_KNOWN_HOSTS: ${{ secrets.BACKEND_DEPLOY_KNOWN_HOSTS }}
        run: |
          install -d -m 0700 "$HOME/.ssh"
          printf '%s\n' "$DEPLOY_KEY" > "$HOME/.ssh/backend_deploy"
          chmod 0600 "$HOME/.ssh/backend_deploy"
          printf '%s\n' "$DEPLOY_KNOWN_HOSTS" > "$HOME/.ssh/known_hosts"
          chmod 0644 "$HOME/.ssh/known_hosts"

      - name: Trigger server deploy
        env:
          DEPLOY_HOST: ${{ secrets.BACKEND_DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.BACKEND_DEPLOY_USER }}
        run: |
          ssh -o ServerAliveInterval=30 -i "$HOME/.ssh/backend_deploy" "$DEPLOY_USER@$DEPLOY_HOST" \
            "nohup /usr/local/sbin/surprising-wallet-backend-deploy > /var/log/surprising-wallet-deploy.log 2>&1 &"
          echo "Deploy triggered on server. Polling for completion..."
          for i in $(seq 1 60); do
            sleep 10
            if ssh -o ConnectTimeout=5 -o ServerAliveInterval=5 -i "$HOME/.ssh/backend_deploy" "$DEPLOY_USER@$DEPLOY_HOST" \
              "grep -q 'backend release.*is healthy' /var/log/surprising-wallet-deploy.log 2>/dev/null"; then
              echo "✅ Deploy succeeded"
              exit 0
            fi
            if ssh -o ConnectTimeout=5 -o ServerAliveInterval=5 -i "$HOME/.ssh/backend_deploy" "$DEPLOY_USER@$DEPLOY_HOST" \
              "grep -q 'backend release.*failed health check\|deploy must run as root\|repo directory does not exist\|build did not produce\|env file.*is missing' /var/log/surprising-wallet-deploy.log 2>/dev/null"; then
              echo "❌ Deploy failed"
              ssh -o ConnectTimeout=5 -i "$HOME/.ssh/backend_deploy" "$DEPLOY_USER@$DEPLOY_HOST" \
                "tail -30 /var/log/surprising-wallet-deploy.log"
              exit 1
            fi
            echo "  waiting... ($((i*10))s)"
          done
          echo "❌ Deploy timed out after 10 minutes"
          exit 1
