# ============================================================
# wallet-server configuration
# ============================================================

server:
  port: 8002
  error:
    whitelabel:
      enabled: false

logging:
  file:
    path: ./logs

spring:
  application:
    name: wallet-server
  # data source - PostgreSQL
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://127.0.0.1:5432/wallet
    username: wallet
    password: wallet123
    hikari:
      maximum-pool-size: 20
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      password:
  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848
      config:
        server-addr: 127.0.0.1:8848
        file-extension: yaml
  config:
    import: optional:nacos:wallet-server.yaml

# feign
feign:
  client:
    config:
      default:
        connectTimeout: 10000
        readTimeout: 40000
  hystrix:
    enabled: false

