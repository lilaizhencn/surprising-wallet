# ============================================================
# wallet-server configuration
# ============================================================

server:
  port: 8002

logging:
  file:
    path: ./logs

spring:
  application:
    name: wallet-server
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://127.0.0.1:5432/wallet
    username: wallet
    password: ${WALLET_DB_PASSWORD:}
    hikari:
      maximum-pool-size: 20
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      password:
  web:
    error:
      whitelabel:
        enabled: false

