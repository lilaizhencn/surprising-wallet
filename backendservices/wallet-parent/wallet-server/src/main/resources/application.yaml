# ============================================================
# wallet-server configuration
# ============================================================

server:
  port: ${SW_HTTP_PORT:8002}

logging:
  file:
    path: ./logs

spring:
  application:
    name: wallet-server
  task:
    scheduling:
      pool:
        size: 8
      thread-name-prefix: wallet-scheduler-
  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${SW_DB_URL:jdbc:postgresql://127.0.0.1:5432/wallet}
    username: ${SW_DB_USERNAME:wallet}
    password: ${SW_DB_PASSWORD:}
    hikari:
      maximum-pool-size: 20
  sql:
    init:
      mode: never
  data:
    redis:
      host: ${SW_REDIS_HOST:127.0.0.1}
      port: ${SW_REDIS_PORT:6379}
      password: ${SW_REDIS_PASSWORD:}
  web:
    error:
      whitelabel:
        enabled: false

# ============================================================
# Application specific config
# ============================================================
sw:
  app:
    env:
      name: ${SW_APP_ENV:dev}
  rpc:
    provider:
      max-concurrent-requests: 1
  warning:
    contacts: "13261645368"
  wallet:
    admin:
      username: ${SW_WALLET_ADMIN_USERNAME:admin}
      password: ${SW_WALLET_ADMIN_PASSWORD:}
    network: test
    # Local-chain transaction simulator. It is disabled by default and refuses
    # non-loopback RPC endpoints or production-like environments when enabled.
    dev-faucet:
      enabled: ${SW_WALLET_DEV_FAUCET_ENABLED:false}
      delay: ${SW_WALLET_DEV_FAUCET_DELAY:PT10S}
      retry-delay: ${SW_WALLET_DEV_FAUCET_RETRY_DELAY:PT30S}
      request-timeout: ${SW_WALLET_DEV_FAUCET_REQUEST_TIMEOUT:PT10S}
      batch-size: ${SW_WALLET_DEV_FAUCET_BATCH_SIZE:20}
      max-attempts: ${SW_WALLET_DEV_FAUCET_MAX_ATTEMPTS:3}
      bitcoin:
        rpc-url: ${SW_WALLET_DEV_FAUCET_BTC_RPC_URL:http://127.0.0.1:18444}
        rpc-username: ${SW_WALLET_DEV_FAUCET_BTC_RPC_USERNAME:}
        rpc-password: ${SW_WALLET_DEV_FAUCET_BTC_RPC_PASSWORD:}
        wallet: ${SW_WALLET_DEV_FAUCET_BTC_WALLET:regtest-funder}
        confirmation-blocks: ${SW_WALLET_DEV_FAUCET_BTC_CONFIRMATION_BLOCKS:6}
        gas-amount: ${SW_WALLET_DEV_FAUCET_BTC_GAS_AMOUNT:0.10000000}
        customer:
          min: ${SW_WALLET_DEV_FAUCET_BTC_CUSTOMER_MIN:0.01000000}
          max: ${SW_WALLET_DEV_FAUCET_BTC_CUSTOMER_MAX:0.10000000}
          scale: 8
      evm:
        rpc-url: ${SW_WALLET_DEV_FAUCET_EVM_RPC_URL:http://127.0.0.1:8545}
        from-address: ${SW_WALLET_DEV_FAUCET_EVM_FROM_ADDRESS:}
        gas-amount: ${SW_WALLET_DEV_FAUCET_ETH_GAS_AMOUNT:1.000000}
        customer:
          min: ${SW_WALLET_DEV_FAUCET_ETH_CUSTOMER_MIN:0.100000}
          max: ${SW_WALLET_DEV_FAUCET_ETH_CUSTOMER_MAX:1.000000}
          scale: 6
        usdt:
          min: ${SW_WALLET_DEV_FAUCET_USDT_CUSTOMER_MIN:10.00}
          max: ${SW_WALLET_DEV_FAUCET_USDT_CUSTOMER_MAX:100.00}
          scale: 2
        usdc:
          min: ${SW_WALLET_DEV_FAUCET_USDC_CUSTOMER_MIN:10.00}
          max: ${SW_WALLET_DEV_FAUCET_USDC_CUSTOMER_MAX:100.00}
          scale: 2
    custody:
      secret-master-key: 339c28dcd013766105fe1c470b03b9e5637d99c4c260d04bbf2ead36f763b944
      session-ttl: ${SW_CUSTODY_SESSION_TTL:PT12H}
      session-cookie-secure: false
      api-clock-skew: ${SW_CUSTODY_API_CLOCK_SKEW:PT5M}
      platform-admin:
        email: ${SW_CUSTODY_PLATFORM_ADMIN_EMAIL:}
        password: ${SW_CUSTODY_PLATFORM_ADMIN_PASSWORD:}
