    .chain { fill: #fefce8; stroke: #ca8a04; stroke-width: 1.5; rx: 8; }
    .infra { fill: #faf5ff; stroke: #9333ea; stroke-width: 2; rx: 10; }
    .label { font: 14px sans-serif; font-weight: 700; fill: #1e293b; }
