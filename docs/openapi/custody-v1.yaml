openapi: 3.1.0
info:
  title: Surprising Wallet Custody API
  version: 1.0.0
  description: |
    Multi-tenant custody, Console, and platform control-plane API.
    Tenant identity is derived from the authenticated credential and is never
    accepted as a trusted request field.
servers:
  - url: https://wallet.example.com
tags:
  - name: Public API
  - name: Console authentication
  - name: Console addresses
  - name: Console chains
  - name: Console transfers
  - name: Console Gas
  - name: Console security
  - name: Console Webhooks
  - name: Platform
paths:
  /custody/api/v1/addresses:
    get:
      tags: [Public API]
      summary: List tenant addresses
      security: [{ custodyKey: [], custodyTimestamp: [], custodyNonce: [], custodySignature: [] }]
      parameters:
        - $ref: '#/components/parameters/Chain'
        - $ref: '#/components/parameters/Status'
        - $ref: '#/components/parameters/Search'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
      responses:
        '200':
          description: Tenant-scoped addresses
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Address' }
        default: { $ref: '#/components/responses/Error' }
    post:
      tags: [Public API]
      summary: Get or create the stable tenant address on the enabled network
      description: |
        The request body accepts a chain code and tenant-defined subject. The
        service selects that chain's enabled network. The `(tenant, chain,
        subject, addressVersion)` business key is idempotent. `addressVersion`
        defaults to 0; increment it when the tenant wants to rotate a user's
        deposit address. All EVM chains use coinType 60, so the same tenant,
        subject, and addressVersion return the same address on every enabled
        EVM chain. Older versions remain monitored. Address creation does not
        emit a Webhook.
      security: [{ custodyKey: [], custodyTimestamp: [], custodyNonce: [], custodySignature: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreatePublicAddress' }
      responses:
        '200':
          description: Existing or newly created stable address
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Address' }
        default: { $ref: '#/components/responses/Error' }
  /custody/api/v1/assets:
    get:
      tags: [Public API]
      summary: List aggregate tenant assets
      security: [{ custodyKey: [], custodyTimestamp: [], custodyNonce: [], custodySignature: [] }]
      responses:
        '200':
          description: Balances aggregated by chain and asset
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/AssetBalance' }
        default: { $ref: '#/components/responses/Error' }
  /custody/api/v1/deposits:
    get:
      tags: [Public API]
      summary: List confirmed tenant deposits
      security: [{ custodyKey: [], custodyTimestamp: [], custodyNonce: [], custodySignature: [] }]
      parameters:
        - $ref: '#/components/parameters/Status'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
      responses:
        '200':
          description: Deposit records
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Deposit' }
        default: { $ref: '#/components/responses/Error' }
  /custody/api/v1/withdrawals:
    get:
      tags: [Public API]
      summary: List tenant withdrawals
      security: [{ custodyKey: [], custodyTimestamp: [], custodyNonce: [], custodySignature: [] }]
      parameters:
        - $ref: '#/components/parameters/Status'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
      responses:
        '200':
          description: Withdrawal records
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Withdrawal' }
        default: { $ref: '#/components/responses/Error' }
    post:
      tags: [Public API]
      summary: Create a withdrawal
      description: >-
        Idempotency-Key is permanent for withdrawal creation. The destination
        is a validated external chain address and does not need to be an address
        previously allocated by this wallet service.
      security: [{ custodyKey: [], custodyTimestamp: [], custodyNonce: [], custodySignature: [] }]
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateWithdrawal' }
      responses:
        '201':
          description: Accepted withdrawal
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Withdrawal' }
        default: { $ref: '#/components/responses/Error' }
  /custody/console/v1/auth/login:
    post:
      tags: [Console authentication]
      summary: Sign in to a tenant Console
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email }
                password: { type: string, format: password }
      responses:
        '200':
          description: Console session
          content:
            application/json:
              schema: { $ref: '#/components/schemas/LoginResult' }
        default: { $ref: '#/components/responses/Error' }
  /custody/console/v1/auth/me:
    get:
      tags: [Console authentication]
      summary: Read the tenant Console principal
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: Current principal }
        default: { $ref: '#/components/responses/Error' }
  /custody/console/v1/auth/logout:
    post:
      tags: [Console authentication]
      summary: Revoke the current Console session
      security: [{ bearerAuth: [] }]
      responses:
        '200': { $ref: '#/components/responses/Ok' }
        default: { $ref: '#/components/responses/Error' }
  /custody/console/v1/addresses:
    get:
      tags: [Console addresses]
      summary: List tenant addresses
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/Chain'
        - name: source
          in: query
          schema: { type: string, enum: [API, CONSOLE] }
        - $ref: '#/components/parameters/Status'
        - $ref: '#/components/parameters/Search'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
      responses:
        '200':
          description: Addresses
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Address' }
        default: { $ref: '#/components/responses/Error' }
    post:
      tags: [Console addresses]
      summary: Create a tenant address from Console
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateAddress' }
      responses:
        '200':
          description: Created address
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Address' }
        default: { $ref: '#/components/responses/Error' }
  /custody/console/v1/addresses/{addressId}:
    patch:
      tags: [Console addresses]
      summary: Change address label, metadata, or lifecycle status
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/AddressId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                label: { type: string, maxLength: 160 }
                metadata: { type: object, additionalProperties: true }
                status: { type: string, enum: [ACTIVE, DISABLED] }
      responses:
        '200':
          description: Updated address
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Address' }
        default: { $ref: '#/components/responses/Error' }
  /custody/console/v1/chains:
    get:
      tags: [Console chains]
      summary: List platform-enabled chains and tokens available to the tenant
      description: Opening a chain automatically enables every platform-supported token. Configured but platform-disabled tokens remain visible and unavailable.
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Tenant chain state, available tokens, and collection addresses
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/TenantChain' }
        default: { $ref: '#/components/responses/Error' }
  /custody/console/v1/chains/{chain}:
    put:
      tags: [Console chains]
      summary: Open or close a chain for the tenant
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/ChainPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [enabled]
              properties:
                enabled: { type: boolean }
      responses:
        '200':
          description: Updated tenant chain
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TenantChain' }
        default: { $ref: '#/components/responses/Error' }
  /custody/console/v1/assets:
    get:
      tags: [Console addresses]
      summary: List aggregate tenant assets
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Asset balances
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/AssetBalance' }
        default: { $ref: '#/components/responses/Error' }
  /custody/console/v1/onboarding:
    get:
      tags: [Console Gas]
      summary: Read the tenant onboarding checklist
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: Six-step onboarding readiness }
        default: { $ref: '#/components/responses/Error' }
  /custody/console/v1/gas-accounts:
    get:
      tags: [Console Gas]
      summary: List tenant collection and network-fee addresses
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Fixed childIndex 1 addresses backed by confirmed native-coin balances
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/GasAccount' }
        default: { $ref: '#/components/responses/Error' }
    post:
      tags: [Console Gas]
      summary: Generate the chain collection and network-fee address
      description: >-
        Uses fixed childIndex 1. All EVM chains for the tenant share one
        derivation subject and therefore return the same EVM address, while
        balances and network-fee accounting remain isolated by chain.
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [chain]
              properties:
                chain: { type: string }
      responses:
        '201':
          description: Created or existing gas account for the network
          content:
            application/json:
              schema: { $ref: '#/components/schemas/GasAccount' }
        default: { $ref: '#/components/responses/Error' }
  /custody/console/v1/gas-accounts/{gasAccountId}:
    patch:
      tags: [Console Gas]
      summary: Change a gas warning threshold or lifecycle status
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/GasAccountId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                lowBalanceThreshold: { type: string }
                status: { type: string, enum: [ACTIVE, DISABLED] }
      responses:
        '200':
          description: Updated gas account
          content:
            application/json:
              schema: { $ref: '#/components/schemas/GasAccount' }
        default: { $ref: '#/components/responses/Error' }
  /custody/console/v1/gas-accounts/{gasAccountId}/topups:
    get:
      tags: [Console Gas]
      summary: List confirmed native-coin funding deposits
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/GasAccountId'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
      responses:
        '200': { description: Funding history }
        default: { $ref: '#/components/responses/Error' }
  /custody/console/v1/gas-accounts/{gasAccountId}/usage:
    get:
      tags: [Console Gas]
      summary: List withdrawal fee reservations and settlements
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/GasAccountId'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
      responses:
        '200':
          description: Auditable network-fee usage
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/GasUsage' }
        default: { $ref: '#/components/responses/Error' }
  /custody/console/v1/deposits:
    get:
      tags: [Console transfers]
      summary: List deposits
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/Status'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
      responses:
        '200':
          description: Deposits
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Deposit' }
        default: { $ref: '#/components/responses/Error' }
  /custody/console/v1/withdrawals:
    get:
      tags: [Console transfers]
      summary: List withdrawals
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/Status'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
      responses:
        '200':
          description: Withdrawals
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Withdrawal' }
        default: { $ref: '#/components/responses/Error' }
    post:
      tags: [Console transfers]
      summary: Create a withdrawal from Console
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateWithdrawal' }
      responses:
        '200':
          description: Created withdrawal
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Withdrawal' }
        default: { $ref: '#/components/responses/Error' }
  /custody/console/v1/api-keys:
    get:
      tags: [Console security]
      summary: List API keys
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: API keys }
        default: { $ref: '#/components/responses/Error' }
    post:
      tags: [Console security]
      summary: Create an API key
      description: The plaintext secret is returned only once. Every API key can call all tenant API operations.
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string, maxLength: 120 }
      responses:
        '200': { description: One-time key ID and secret }
        default: { $ref: '#/components/responses/Error' }
  /custody/console/v1/api-keys/{apiKeyId}:
    delete:
      tags: [Console security]
      summary: Revoke an API key
      security: [{ bearerAuth: [] }]
      parameters:
        - name: apiKeyId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { $ref: '#/components/responses/Ok' }
        default: { $ref: '#/components/responses/Error' }
  /custody/console/v1/ip-allowlist:
    get:
      tags: [Console security]
      summary: Read IP allowlist state and rules
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: Enforcement state and CIDR rules }
        default: { $ref: '#/components/responses/Error' }
  /custody/console/v1/ip-allowlist/enforcement:
    put:
      tags: [Console security]
      summary: Enable or disable API IP enforcement
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [enabled]
              properties:
                enabled: { type: boolean }
      responses:
        '200': { description: Updated enforcement state and rules }
        default: { $ref: '#/components/responses/Error' }
  /custody/console/v1/ip-allowlist/rules:
    post:
      tags: [Console security]
      summary: Add an IPv4 or IPv6 CIDR rule
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [label, cidr]
              properties:
                label: { type: string, maxLength: 120 }
                cidr: { type: string, maxLength: 64 }
      responses:
        '200': { description: Created CIDR rule }
        default: { $ref: '#/components/responses/Error' }
  /custody/console/v1/ip-allowlist/rules/{ruleId}:
    delete:
      tags: [Console security]
      summary: Delete a CIDR rule
      security: [{ bearerAuth: [] }]
      parameters:
        - name: ruleId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { $ref: '#/components/responses/Ok' }
        default: { $ref: '#/components/responses/Error' }
  /custody/console/v1/audit-log:
    get:
      tags: [Console security]
      summary: List tenant audit entries
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
      responses:
        '200': { description: Audit entries }
        default: { $ref: '#/components/responses/Error' }
  /custody/console/v1/webhooks:
    get:
      tags: [Console Webhooks]
      summary: List tenant Webhook endpoints
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: Endpoints and 24-hour health }
        default: { $ref: '#/components/responses/Error' }
    post:
      tags: [Console Webhooks]
      summary: Create a Webhook endpoint
      description: |
        The signing secret is returned only once. Event selection is not
        configurable: every supported event associated with an API-created
        custody address is delivered to every active endpoint.
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateWebhook' }
      responses:
        '200': { description: Pending endpoint and one-time signing secret }
        default: { $ref: '#/components/responses/Error' }
  /custody/console/v1/webhooks/{endpointId}/verify:
    post:
      tags: [Console Webhooks]
      summary: Send a challenge and activate an endpoint
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/EndpointId'
      responses:
        '200': { description: Verified endpoint }
        default: { $ref: '#/components/responses/Error' }
  /custody/console/v1/webhooks/{endpointId}/status:
    patch:
      tags: [Console Webhooks]
      summary: Enable or disable a verified endpoint
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/EndpointId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [enabled]
              properties:
                enabled: { type: boolean }
      responses:
        '200': { $ref: '#/components/responses/Ok' }
        default: { $ref: '#/components/responses/Error' }
  /custody/console/v1/webhook-deliveries:
    get:
      tags: [Console Webhooks]
      summary: List Webhook deliveries
      security: [{ bearerAuth: [] }]
      parameters:
        - name: endpointId
          in: query
          schema: { type: string, format: uuid }
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
      responses:
        '200': { description: Delivery history }
        default: { $ref: '#/components/responses/Error' }
  /custody/console/v1/webhook-deliveries/{deliveryId}/retry:
    post:
      tags: [Console Webhooks]
      summary: Retry a failed or retryable delivery
      security: [{ bearerAuth: [] }]
      parameters:
        - name: deliveryId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { $ref: '#/components/responses/Ok' }
        default: { $ref: '#/components/responses/Error' }
  /custody/console/v1/webhook-deliveries/{deliveryId}/attempts:
    get:
      tags: [Console Webhooks]
      summary: List every automatic and manual delivery attempt
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/DeliveryId'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
      responses:
        '200':
          description: Immutable attempt history
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/WebhookDeliveryAttempt' }
        default: { $ref: '#/components/responses/Error' }
  /custody/platform/v1/auth/login:
    post:
      tags: [Platform]
      summary: Sign in as platform administrator
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email }
                password: { type: string, format: password }
      responses:
        '200':
          description: Platform session
          content:
            application/json:
              schema: { $ref: '#/components/schemas/LoginResult' }
        default: { $ref: '#/components/responses/Error' }
  /custody/platform/v1/auth/me:
    get:
      tags: [Platform]
      summary: Read the platform principal
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: Current principal }
        default: { $ref: '#/components/responses/Error' }
  /custody/platform/v1/auth/logout:
    post:
      tags: [Platform]
      summary: Revoke the platform session
      security: [{ bearerAuth: [] }]
      responses:
        '200': { $ref: '#/components/responses/Ok' }
        default: { $ref: '#/components/responses/Error' }
  /custody/platform/v1/tenants:
    get:
      tags: [Platform]
      summary: Search and page tenants with operational counts
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/Search'
        - name: status
          in: query
          schema: { type: string, enum: [ACTIVE, SUSPENDED] }
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
      responses:
        '200':
          description: Tenant page
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TenantPage' }
        default: { $ref: '#/components/responses/Error' }
    post:
      tags: [Platform]
      summary: Create a tenant and initial tenant administrator
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [slug, name, adminEmail, adminDisplayName, adminPassword]
              properties:
                slug:
                  type: string
                  pattern: '^[a-z0-9][a-z0-9-]{1,62}[a-z0-9]$'
                name: { type: string, maxLength: 160 }
                adminEmail: { type: string, format: email }
                adminDisplayName: { type: string, maxLength: 120 }
                adminPassword: { type: string, minLength: 12, maxLength: 256 }
      responses:
        '200': { description: Created tenant }
        default: { $ref: '#/components/responses/Error' }
  /custody/platform/v1/tenants/{tenantId}:
    get:
      tags: [Platform]
      summary: Read a complete tenant operations snapshot
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/TenantId'
      responses:
        '200':
          description: Tenant settings, readiness, users, balances, integration health and activity
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TenantDetail' }
        default: { $ref: '#/components/responses/Error' }
    patch:
      tags: [Platform]
      summary: Update tenant reporting details
      description: The stable tenant slug and derivation namespace cannot be changed.
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/TenantId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string, minLength: 1, maxLength: 160 }
                displayCurrency:
                  type: string
                  pattern: '^[A-Z0-9]{3,12}$'
      responses:
        '200':
          description: Updated tenant
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Tenant' }
        default: { $ref: '#/components/responses/Error' }
  /custody/platform/v1/tenants/{tenantId}/status:
    patch:
      tags: [Platform]
      summary: Suspend or reactivate a tenant
      description: Suspending a tenant immediately blocks API access and revokes active Console sessions.
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/TenantId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status: { type: string, enum: [ACTIVE, SUSPENDED] }
      responses:
        '200': { description: Updated tenant }
        default: { $ref: '#/components/responses/Error' }
  /custody/platform/v1/tenants/{tenantId}/administrators/{userId}/unlock:
    post:
      tags: [Platform]
      summary: Clear a tenant administrator login lock
      description: Clears only failed-login counters and the temporary lock. Password material is never exposed.
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - name: userId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { description: Unlocked tenant administrator }
        default: { $ref: '#/components/responses/Error' }
  /custody/platform/v1/wallet-config/summary:
    get:
      tags: [Platform]
      summary: Read wallet configuration health and effective runtime state
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Global switches, enabled resource counts, chain states, and anomalies
          content:
            application/json:
              schema: { $ref: '#/components/schemas/WalletConfigSummary' }
        default: { $ref: '#/components/responses/Error' }
  /custody/platform/v1/wallet-config/global-switches:
    patch:
      tags: [Platform]
      summary: Atomically update all global wallet runtime switches
      description: The new switch values take effect immediately after the database transaction commits.
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/WalletGlobalSwitches' }
      responses:
        '200':
          description: Updated wallet configuration summary
          content:
            application/json:
              schema: { $ref: '#/components/schemas/WalletConfigSummary' }
        default: { $ref: '#/components/responses/Error' }
  /custody/platform/v1/wallet-config/chains:
    get:
      tags: [Platform]
      summary: List wallet chain profiles
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Chain profiles
          content:
            application/json:
              schema: { type: array, items: { $ref: '#/components/schemas/WalletChain' } }
        default: { $ref: '#/components/responses/Error' }
    post:
      tags: [Platform]
      summary: Create a disabled-first wallet chain profile
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/WalletChainCommand' } } }
      responses:
        '200': { description: Created chain detail }
        default: { $ref: '#/components/responses/Error' }
  /custody/platform/v1/wallet-config/chains/{id}:
    get:
      tags: [Platform]
      summary: Read a chain with its RPC nodes, tokens, and checks
      security: [{ bearerAuth: [] }]
      parameters: [{ name: id, in: path, required: true, schema: { type: integer, format: int64 } }]
      responses:
        '200': { description: Chain detail }
        default: { $ref: '#/components/responses/Error' }
    patch:
      tags: [Platform]
      summary: Update chain profile settings
      security: [{ bearerAuth: [] }]
      parameters: [{ name: id, in: path, required: true, schema: { type: integer, format: int64 } }]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/WalletChainCommand' } } }
      responses:
        '200': { description: Updated chain detail }
        default: { $ref: '#/components/responses/Error' }
  /custody/platform/v1/wallet-config/chains/{id}/switches:
    patch:
      tags: [Platform]
      summary: Atomically update chain and task switches
      description: Production accepts only production networks. Every environment permits only one enabled network per chain.
      security: [{ bearerAuth: [] }]
      parameters: [{ name: id, in: path, required: true, schema: { type: integer, format: int64 } }]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/WalletChainSwitches' } } }
      responses:
        '200': { description: Updated chain detail }
        default: { $ref: '#/components/responses/Error' }
  /custody/platform/v1/wallet-config/chains/{id}/rpc-nodes:
    get:
      tags: [Platform]
      summary: List RPC nodes owned by a chain profile
      security: [{ bearerAuth: [] }]
      parameters: [{ name: id, in: path, required: true, schema: { type: integer, format: int64 } }]
      responses:
        '200': { description: RPC nodes with credential-presence flags only }
        default: { $ref: '#/components/responses/Error' }
    post:
      tags: [Platform]
      summary: Add an RPC node to a chain profile
      security: [{ bearerAuth: [] }]
      parameters: [{ name: id, in: path, required: true, schema: { type: integer, format: int64 } }]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/WalletRpcCommand' } } }
      responses:
        '200': { description: Created RPC node }
        default: { $ref: '#/components/responses/Error' }
  /custody/platform/v1/wallet-config/chains/{id}/rpc-nodes/{nodeId}:
    patch:
      tags: [Platform]
      summary: Update an RPC node; omitted secrets retain stored values
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer, format: int64 } }
        - { name: nodeId, in: path, required: true, schema: { type: integer, format: int64 } }
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/WalletRpcCommand' } } }
      responses:
        '200': { description: Updated RPC node }
        default: { $ref: '#/components/responses/Error' }
    delete:
      tags: [Platform]
      summary: Delete a disabled RPC node
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer, format: int64 } }
        - { name: nodeId, in: path, required: true, schema: { type: integer, format: int64 } }
      responses:
        '200': { description: RPC node deleted }
        default: { $ref: '#/components/responses/Error' }
  /custody/platform/v1/wallet-config/chains/{id}/rpc-nodes/{nodeId}/test:
    post:
      tags: [Platform]
      summary: Test an RPC node with stored authentication
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer, format: int64 } }
        - { name: nodeId, in: path, required: true, schema: { type: integer, format: int64 } }
      responses:
        '200': { description: Health result, latency, and safe error text }
        default: { $ref: '#/components/responses/Error' }
  /custody/platform/v1/wallet-config/tokens:
    get:
      tags: [Platform]
      summary: Search wallet tokens
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: Token configurations with effective state }
        default: { $ref: '#/components/responses/Error' }
    post:
      tags: [Platform]
      summary: Atomically create token_config and chain_asset definitions
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/WalletTokenCommand' } } }
      responses:
        '200': { description: Created token }
        default: { $ref: '#/components/responses/Error' }
  /custody/platform/v1/wallet-config/tokens/matrix:
    get:
      tags: [Platform]
      summary: Read the cross-chain token activation matrix in one request
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: Token matrix }
        default: { $ref: '#/components/responses/Error' }
  /custody/platform/v1/wallet-config/tokens/{id}:
    patch:
      tags: [Platform]
      summary: Atomically update token_config and chain_asset definitions
      security: [{ bearerAuth: [] }]
      parameters: [{ name: id, in: path, required: true, schema: { type: integer, format: int64 } }]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/WalletTokenCommand' } } }
      responses:
        '200': { description: Updated token }
        default: { $ref: '#/components/responses/Error' }
  /custody/platform/v1/wallet-config/tokens/{id}/status:
    patch:
      tags: [Platform]
      summary: Atomically change token and ledger-asset activation state
      security: [{ bearerAuth: [] }]
      parameters: [{ name: id, in: path, required: true, schema: { type: integer, format: int64 } }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [enabled]
              properties: { enabled: { type: boolean } }
      responses:
        '200': { description: Updated token }
        default: { $ref: '#/components/responses/Error' }
  /custody/platform/v1/wallet-config/audit-log:
    get:
      tags: [Platform]
      summary: List platform wallet-configuration audit events
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: Platform audit events }
        default: { $ref: '#/components/responses/Error' }
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: ConsoleSession
    custodyKey:
      type: apiKey
      in: header
      name: X-Custody-Key
    custodyTimestamp:
      type: apiKey
      in: header
      name: X-Custody-Timestamp
    custodyNonce:
      type: apiKey
      in: header
      name: X-Custody-Nonce
    custodySignature:
      type: apiKey
      in: header
      name: X-Custody-Signature
  parameters:
    AddressId:
      name: addressId
      in: path
      required: true
      schema: { type: string, format: uuid }
    TenantId:
      name: tenantId
      in: path
      required: true
      schema: { type: string, format: uuid }
    EndpointId:
      name: endpointId
      in: path
      required: true
      schema: { type: string, format: uuid }
    DeliveryId:
      name: deliveryId
      in: path
      required: true
      schema: { type: string, format: uuid }
    GasAccountId:
      name: gasAccountId
      in: path
      required: true
      schema: { type: string, format: uuid }
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema:
        type: string
        minLength: 8
        maxLength: 160
        pattern: '^[A-Za-z0-9._:-]+$'
    Chain:
      name: chain
      in: query
      schema: { type: string }
    ChainPath:
      name: chain
      in: path
      required: true
      schema: { type: string }
    Status:
      name: status
      in: query
      schema: { type: string }
    Search:
      name: search
      in: query
      schema: { type: string }
    Limit:
      name: limit
      in: query
      schema: { type: integer, minimum: 1, maximum: 200, default: 50 }
    Offset:
      name: offset
      in: query
      schema: { type: integer, minimum: 0, default: 0 }
  responses:
    Ok:
      description: Operation completed
      content:
        application/json:
          schema:
            type: object
            required: [ok]
            properties:
              ok: { type: boolean, const: true }
    Error:
      description: Actionable JSON error response without credential or signature material
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
  schemas:
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code: { type: string }
            message: { type: string }
    WalletGlobalSwitches:
      type: object
      required: [walletEnabled, scanEnabled, withdrawEnabled, collectionEnabled, transferEnabled]
      properties:
        walletEnabled: { type: boolean }
        scanEnabled: { type: boolean }
        withdrawEnabled: { type: boolean }
        collectionEnabled: { type: boolean }
        transferEnabled: { type: boolean }
    WalletChainSwitches:
      type: object
      required: [enabled, scanEnabled, withdrawEnabled, collectionEnabled, transferEnabled]
      properties:
        enabled: { type: boolean }
        scanEnabled: { type: boolean }
        withdrawEnabled: { type: boolean }
        collectionEnabled: { type: boolean }
        transferEnabled: { type: boolean }
    WalletChainCommand:
      type: object
      properties:
        chain: { type: string }
        network: { type: string }
        family: { type: string }
        runtimeCurrencyId: { type: integer }
        bip44CoinType: { type: integer }
        nativeSymbol: { type: string }
        explorerUrl: { type: [string, 'null'], format: uri }
        depositConfirmations: { type: integer, minimum: 0 }
        withdrawConfirmations: { type: integer, minimum: 0 }
        defaultFeeRate: { type: [integer, 'null'], format: int64 }
        dustThreshold: { type: [integer, 'null'], format: int64 }
        enabled: { type: boolean }
        chainId: { type: [integer, 'null'], format: int64 }
        gasPolicy: { type: [string, 'null'] }
        scanBatchSize: { type: integer, minimum: 1 }
        scanEnabled: { type: boolean }
        withdrawEnabled: { type: boolean }
        collectionEnabled: { type: boolean }
        transferEnabled: { type: boolean }
        scanStartHeight: { type: integer, format: int64, minimum: 0 }
        scanMaxBlocksPerRun: { type: integer, format: int64, minimum: 0 }
    WalletChain:
      allOf:
        - $ref: '#/components/schemas/WalletChainCommand'
        - type: object
          required: [id, chain, network, family, runtimeCurrencyId, bip44CoinType, nativeSymbol, enabled]
          properties:
            id: { type: integer, format: int64 }
            tokenCount: { type: integer }
            rpcCount: { type: integer }
            createdAt: { type: string, format: date-time }
            updatedAt: { type: string, format: date-time }
    WalletRpcCommand:
      type: object
      description: Credential values are write-only. Omit them during update to preserve stored values.
      properties:
        environment: { type: string }
        nodeLabel: { type: string }
        purpose: { type: string }
        connectionType: { type: string }
        rpcUrl: { type: string, format: uri }
        authType: { type: string }
        authHeaderName: { type: [string, 'null'] }
        apiKey: { type: [string, 'null'], writeOnly: true }
        username: { type: [string, 'null'], writeOnly: true }
        password: { type: [string, 'null'], writeOnly: true }
        priority: { type: integer, minimum: 0 }
        minRequestIntervalMs: { type: integer, minimum: 0 }
        enabled: { type: boolean }
        renewalDueAt: { type: [string, 'null'], format: date-time }
        remark: { type: [string, 'null'] }
    WalletTokenCommand:
      type: object
      properties:
        chain: { type: string }
        network: { type: string }
        symbol: { type: string }
        standard: { type: string }
        contractAddress: { type: string }
        contractAddressBase58: { type: [string, 'null'] }
        contractAddressHex: { type: [string, 'null'] }
        decimals: { type: integer, minimum: 0, maximum: 38 }
        enabled: { type: boolean }
        collectEnabled: { type: boolean }
        minDeposit: { type: [number, string, 'null'] }
        minWithdraw: { type: [number, string, 'null'] }
        collectThreshold: { type: [number, string, 'null'] }
        gasStrategy: { type: [string, 'null'] }
        confirmationRequired: { type: [integer, 'null'], minimum: 0 }
    WalletTaskSwitches:
      type: object
      required: [scanEnabled, withdrawEnabled, collectionEnabled, transferEnabled]
      properties:
        scanEnabled: { type: boolean }
        withdrawEnabled: { type: boolean }
        collectionEnabled: { type: boolean }
        transferEnabled: { type: boolean }
    WalletConfigStatistics:
      type: object
      required: [configuredChainProfileCount, enabledChainCount, enabledNetworkCount, enabledTokenCount, enabledRpcNodeCount, anomalyCount]
      properties:
        configuredChainProfileCount: { type: integer }
        enabledChainCount: { type: integer }
        enabledNetworkCount: { type: integer }
        enabledTokenCount: { type: integer }
        enabledRpcNodeCount: { type: integer }
        anomalyCount: { type: integer }
    WalletChainStatus:
      type: object
      required: [profileId, chain, network, family, configuredEnabled, configuredTasks, effectiveTasks, enabledTokenCount, enabledRpcNodeCount, status, blockers]
      properties:
        profileId: { type: integer, format: int64 }
        chain: { type: string }
        network: { type: string }
        family: { type: string }
        configuredEnabled: { type: boolean }
        configuredTasks: { $ref: '#/components/schemas/WalletTaskSwitches' }
        effectiveTasks: { $ref: '#/components/schemas/WalletTaskSwitches' }
        enabledTokenCount: { type: integer }
        enabledRpcNodeCount: { type: integer }
        status: { type: string, enum: [ACTIVE, INACTIVE, BLOCKED, DISABLED] }
        blockers:
          type: array
          items: { type: string }
    WalletConfigAnomaly:
      type: object
      required: [code, severity, message]
      properties:
        code: { type: string }
        severity: { type: string, enum: [ERROR, WARNING] }
        chain: { type: [string, 'null'] }
        network: { type: [string, 'null'] }
        message: { type: string }
    WalletConfigSummary:
      type: object
      required: [environment, production, keysetConfigured, globalSwitches, statistics, chains, anomalies, generatedAt]
      properties:
        environment: { type: string }
        production: { type: boolean }
        keysetConfigured: { type: boolean }
        globalSwitches: { $ref: '#/components/schemas/WalletGlobalSwitches' }
        statistics: { $ref: '#/components/schemas/WalletConfigStatistics' }
        chains:
          type: array
          items: { $ref: '#/components/schemas/WalletChainStatus' }
        anomalies:
          type: array
          items: { $ref: '#/components/schemas/WalletConfigAnomaly' }
        generatedAt: { type: string, format: date-time }
    LoginResult:
      type: object
      required: [token, expiresAt, userId, email, displayName, role]
      properties:
        token: { type: string }
        expiresAt: { type: string, format: date-time }
        userId: { type: string, format: uuid }
        tenantId: { type: [string, 'null'], format: uuid }
        tenantSlug: { type: [string, 'null'] }
        email: { type: string, format: email }
        displayName: { type: string }
        role: { type: string }
    CreatePublicAddress:
      type: object
      additionalProperties: false
      required: [chainId, subject]
      properties:
        chainId:
          type: string
          pattern: '^[A-Z][A-Z0-9_]{1,31}$'
          description: Chain code such as ETH, BTC, or SOLANA; not an EVM numeric chain ID.
        subject:
          type: string
          pattern: '^[A-Za-z0-9_][A-Za-z0-9._:-]{0,159}$'
          description: Tenant-defined account or user identifier; the __sw_ prefix is reserved.
        addressVersion:
          type: integer
          format: int64
          minimum: 0
          maximum: 2147483647
          default: 0
          description: Tenant-managed address generation; increment it to rotate the subject's address.
    CreateAddress:
      type: object
      required: [chain, subject]
      properties:
        chain: { type: string, pattern: '^[A-Z][A-Z0-9_]{1,31}$' }
        subject:
          type: string
          pattern: '^[A-Za-z0-9_][A-Za-z0-9._:-]{0,159}$'
        addressVersion:
          type: integer
          format: int64
          minimum: 0
          maximum: 2147483647
          default: 0
        label: { type: string, maxLength: 160 }
        metadata: { type: object, additionalProperties: true }
    Address:
      type: object
      required: [id, chain, network, address, subject, addressVersion, metadata, source, status, createdAt]
      properties:
        id: { type: string, format: uuid }
        chain: { type: string }
        network: { type: string }
        address: { type: string }
        memo: { type: [string, 'null'] }
        subject: { type: string }
        addressVersion: { type: integer, format: int64, minimum: 0, maximum: 2147483647 }
        label: { type: [string, 'null'] }
        metadata: { type: object, additionalProperties: true }
        source: { type: string, enum: [API, CONSOLE] }
        status: { type: string, enum: [ACTIVE, DISABLED] }
        createdAt: { type: string, format: date-time }
    AssetBalance:
      type: object
      required: [chain, assetSymbol, nativeAsset, availableBalance, lockedBalance, totalBalance, addressCount]
      properties:
        chain: { type: string }
        assetSymbol: { type: string }
        nativeAsset: { type: boolean }
        availableBalance: { type: number }
        lockedBalance: { type: number }
        totalBalance: { type: number }
        addressCount: { type: integer, format: int64 }
    TenantToken:
      type: object
      required: [symbol, decimals, platformEnabled]
      properties:
        symbol: { type: string }
        standard: { type: [string, 'null'] }
        contractAddress: { type: [string, 'null'] }
        decimals: { type: integer }
        platformEnabled: { type: boolean }
    TenantChain:
      type: object
      required: [chain, network, family, nativeSymbol, assetSymbols, tokens, status, enabled, scanEnabled, withdrawalEnabled, transferEnabled, capabilities]
      properties:
        chain: { type: string }
        network: { type: string }
        family: { type: string }
        nativeSymbol: { type: string }
        assetSymbols:
          type: array
          items: { type: string }
        tokens:
          type: array
          items: { $ref: '#/components/schemas/TenantToken' }
        status: { type: string, enum: [ACTIVE, CLOSED] }
        enabled: { type: boolean }
        scanEnabled: { type: boolean }
        withdrawalEnabled: { type: boolean }
        transferEnabled: { type: boolean }
        capabilities:
          type: array
          items: { type: string }
        collectionAddressId: { type: [string, 'null'], format: uuid }
        collectionAddress: { type: [string, 'null'] }
        memo: { type: [string, 'null'] }
        openedAt: { type: [string, 'null'], format: date-time }
        closedAt: { type: [string, 'null'], format: date-time }
    Deposit:
      type: object
      properties:
        id: { type: string, format: uuid }
        custodyAddressId: { type: string, format: uuid }
        subject: { type: string }
        chain: { type: string }
        assetSymbol: { type: string }
        txHash: { type: string }
        logIndex: { type: integer, format: int64 }
        amount: { type: number }
        status: { type: string }
        creditedAt: { type: [string, 'null'], format: date-time }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    CreateWithdrawal:
      type: object
      required: [custodyAddressId, chain, assetSymbol, toAddress, amount, confirmed]
      properties:
        custodyAddressId: { type: string, format: uuid }
        chain: { type: string }
        assetSymbol: { type: string }
        toAddress:
          type: string
          maxLength: 160
          description: Validated external destination address for the selected chain.
        amount: { type: string }
        externalReference: { type: string, maxLength: 160 }
        confirmed:
          type: boolean
          const: true
          description: Explicit irreversible-action confirmation.
    Withdrawal:
      type: object
      properties:
        id: { type: string, format: uuid }
        custodyAddressId: { type: string, format: uuid }
        orderNo: { type: string }
        externalReference: { type: [string, 'null'] }
        chain: { type: string }
        assetSymbol: { type: string }
        toAddress: { type: string }
        amount: { type: number }
        fee: { type: number }
        status: { type: string }
        txHash: { type: [string, 'null'] }
        errorMessage: { type: [string, 'null'] }
        createdAt: { type: string, format: date-time }
    GasAccount:
      type: object
      required:
        - id
        - custodyAddressId
        - chain
        - network
        - nativeSymbol
        - address
        - childIndex
        - availableBalance
        - lockedBalance
        - totalBalance
        - lowBalanceThreshold
        - lowBalance
        - status
      properties:
        id: { type: string, format: uuid }
        custodyAddressId: { type: string, format: uuid }
        chain: { type: string }
        network: { type: string }
        nativeSymbol: { type: string }
        address: { type: string }
        memo: { type: [string, 'null'] }
        childIndex: { type: integer, format: int64, const: 1 }
        availableBalance: { type: number }
        lockedBalance: { type: number }
        totalBalance: { type: number }
        lowBalanceThreshold: { type: number }
        lowBalance: { type: boolean }
        status: { type: string, enum: [ACTIVE, DISABLED] }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    GasUsage:
      type: object
      required:
        - id
        - custodyWithdrawalId
        - orderNo
        - chain
        - nativeSymbol
        - reservedAmount
        - status
        - pricingSource
        - createdAt
      properties:
        id: { type: string, format: uuid }
        custodyWithdrawalId: { type: string, format: uuid }
        orderNo: { type: string }
        chain: { type: string }
        nativeSymbol: { type: string }
        reservedAmount: { type: number }
        actualAmount: { type: [number, 'null'] }
        status:
          type: string
          enum: [RESERVED, SETTLED, RELEASED, OVERDUE]
        pricingSource:
          type: string
          enum: [CONFIGURED_RESERVE, CHAIN_RECORDED, CHAIN_CONFIRMED]
        txHash: { type: [string, 'null'] }
        errorMessage: { type: [string, 'null'] }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        settledAt: { type: [string, 'null'], format: date-time }
    WebhookDeliveryAttempt:
      type: object
      required:
        - id
        - attemptNumber
        - retryCycle
        - trigger
        - status
        - startedAt
      properties:
        id: { type: string, format: uuid }
        attemptNumber: { type: integer }
        retryCycle: { type: integer }
        trigger: { type: string, enum: [AUTOMATIC, MANUAL, RECOVERY] }
        status:
          type: string
          enum: [RUNNING, DELIVERED, RETRY_SCHEDULED, FAILED]
        httpStatus: { type: [integer, 'null'] }
        errorMessage: { type: [string, 'null'] }
        responseBody: { type: [string, 'null'] }
        nextAttemptAt: { type: [string, 'null'], format: date-time }
        startedAt: { type: string, format: date-time }
        completedAt: { type: [string, 'null'], format: date-time }
        durationMs: { type: [integer, 'null'], format: int64 }
    Tenant:
      type: object
      required:
        - id
        - slug
        - name
        - status
        - derivationNamespace
        - ipAllowlistEnabled
        - displayCurrency
        - createdAt
        - updatedAt
      properties:
        id: { type: string, format: uuid }
        slug: { type: string }
        name: { type: string }
        status: { type: string, enum: [ACTIVE, SUSPENDED] }
        derivationNamespace: { type: integer }
        ipAllowlistEnabled: { type: boolean }
        displayCurrency: { type: string }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    TenantSummary:
      allOf:
        - $ref: '#/components/schemas/Tenant'
        - type: object
          required:
            - addressCount
            - depositCount
            - withdrawalCount
            - activeWebhookCount
            - activeApiKeyCount
            - gasAccountCount
            - failedWebhookDeliveryCount
          properties:
            addressCount: { type: integer, format: int64 }
            depositCount: { type: integer, format: int64 }
            withdrawalCount: { type: integer, format: int64 }
            activeWebhookCount: { type: integer, format: int64 }
            activeApiKeyCount: { type: integer, format: int64 }
            gasAccountCount: { type: integer, format: int64 }
            failedWebhookDeliveryCount: { type: integer, format: int64 }
    TenantPage:
      type: object
      required: [items, total, limit, offset]
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/TenantSummary' }
        total: { type: integer, format: int64 }
        limit: { type: integer }
        offset: { type: integer }
    TenantDetail:
      type: object
      required:
        - tenant
        - statistics
        - onboarding
        - administrators
        - assets
        - recentAddresses
        - gasAccounts
        - apiKeys
        - ipRules
        - webhooks
        - webhookDeliveries
        - recentDeposits
        - recentWithdrawals
        - recentAudit
      properties:
        tenant: { $ref: '#/components/schemas/Tenant' }
        statistics:
          type: object
          additionalProperties: { type: integer, format: int64 }
        onboarding:
          type: object
          required: [completedSteps, totalSteps, ready]
          properties:
            apiKeyConfigured: { type: boolean }
            webhookConfigured: { type: boolean }
            ipAllowlistConfigured: { type: boolean }
            addressCreated: { type: boolean }
            gasAccountConfigured: { type: boolean }
            gasAccountFunded: { type: boolean }
            completedSteps: { type: integer }
            totalSteps: { type: integer }
            ready: { type: boolean }
        administrators:
          type: array
          items:
            type: object
            properties:
              id: { type: string, format: uuid }
              email: { type: string, format: email }
              displayName: { type: string }
              role: { type: string }
              status: { type: string }
              failedLoginCount: { type: integer }
              lockedUntil: { type: [string, 'null'], format: date-time }
              lastLoginAt: { type: [string, 'null'], format: date-time }
        assets:
          type: array
          items: { $ref: '#/components/schemas/AssetBalance' }
        recentAddresses:
          type: array
          items: { $ref: '#/components/schemas/TenantAddress' }
        gasAccounts:
          type: array
          items: { $ref: '#/components/schemas/GasAccount' }
        apiKeys:
          type: array
          items: { type: object, additionalProperties: true }
        ipRules:
          type: array
          items: { type: object, additionalProperties: true }
        webhooks:
          type: array
          items: { type: object, additionalProperties: true }
        webhookDeliveries:
          type: array
          items: { type: object, additionalProperties: true }
        recentDeposits:
          type: array
          items: { $ref: '#/components/schemas/Deposit' }
        recentWithdrawals:
          type: array
          items: { $ref: '#/components/schemas/Withdrawal' }
        recentAudit:
          type: array
          items: { type: object, additionalProperties: true }
    TenantAddress:
      type: object
      required:
        - id
        - tenantId
        - chainAddressId
        - chain
        - network
        - address
        - metadataJson
        - source
        - status
        - derivationSubject
        - derivationChild
        - createdAt
        - updatedAt
      properties:
        id: { type: string, format: uuid }
        tenantId: { type: string, format: uuid }
        chainAddressId: { type: integer, format: int64 }
        chain: { type: string }
        network: { type: string }
        address: { type: string }
        memo: { type: [string, 'null'] }
        subject: { type: string }
        label: { type: [string, 'null'] }
        metadataJson:
          type: string
          description: Address metadata encoded as JSON.
        source: { type: string, enum: [API, CONSOLE] }
        status: { type: string, enum: [ACTIVE, DISABLED] }
        derivationSubject: { type: integer }
        derivationChild: { type: integer, format: int64, minimum: 0 }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    CreateWebhook:
      type: object
      additionalProperties: false
      required: [name, url]
      properties:
        name: { type: string, maxLength: 120 }
        url: { type: string, format: uri, maxLength: 2048 }
